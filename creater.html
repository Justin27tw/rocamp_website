<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>製作人員名單</title>
    <link rel="icon" type="image/png" href="/images/Png.png">
    <style>
        /* 載入畫面樣式 */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #282c34; 
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 1s ease-out;
        }

        #splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #splash-screen h1 { font-size: 3em; margin-bottom: 20px; }
        #splash-screen p { font-size: 1.2em; margin-bottom: 30px; }
        #splash-screen button {
            padding: 10px 25px;
            font-size: 1.1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #61dafb;
            color: #282c34;
            transition: background-color 0.3s ease;
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            padding-top: 60px; 
            font-family: Arial;
        }

        /* Navbar 樣式 */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #343a40;
            min-height: 60px;
            z-index: 1030;
        }

        .navbar-brand {
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
        }

        .navbar-brand span {
            color: white;
            letter-spacing: 2px;
            font-size: 1rem;
        }

        .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.75);
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: white;
        }

        /* 下拉選單動畫 */
        .navbar-nav .dropdown-menu {
            background-color: #343330;
            border: none;
            border-radius: 0;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            display: block;
            visibility: hidden;
            pointer-events: none;
        }

        .navbar-nav .dropdown-menu.show,
        .nav-item.dropdown:hover .dropdown-menu {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
            pointer-events: auto;
        }

        .navbar-nav .dropdown-item {
            color: rgba(255, 255, 255, 0.75);
            padding: 0.75rem 1.5rem;
        }

        .navbar-nav .dropdown-item:hover {
            background-color: #495057;
            color: white;
        }

        /* Banner */
        .banner-section {
            position: relative;
            width: 100vw;
            height: 500px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .banner-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100%;
            object-fit: cover;
            filter: grayscale(15%) brightness(60%);
            z-index: -1;
        }

        #bannertext {
            color: white;
            text-align: center;
            z-index: 1;
        }

        #bannertext h1 { font-size: 52px; font-weight: bold; }

        /* 卡片樣式 */
        .profile-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
            height: 100%;
        }

        .profile-card:hover { transform: translateY(-5px); }

        .profile-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }

        /* 問卷區塊 */
        .survey-container {
            background-color: #f8f9fa;
            padding: 40px 20px;
            border-radius: 8px;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }

        .radio-group { text-align: left; display: inline-block; margin-bottom: 20px; }
        
        #snackbar {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff;
            text-align: center; border-radius: 5px; padding: 16px; position: fixed;
            z-index: 1050; left: 50%; bottom: 30px; transform: translateX(-50%);
        }

        #snackbar.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        /* 手機版調整 */
        @media (max-width: 767.98px) {
            .banner-section { height: 300px; }
            #bannertext h1 { font-size: 32px; }
            footer { height: auto; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1>歡迎來到製作人員名單</h1>
        <p>正在載入中...</p>
        <button id="continue-button">進入網站</button>
    </div>

    <div id="navbar-placeholder"></div>

    <main id="main-content" style="display: none;">
        <section class="banner-section">
            <img src="/images/2024-12-29_170700.png" alt="Banner Image" class="banner-image">
            <div id="bannertext">
                <h1>製作人員</h1>
                <p>感謝這些夥伴的努力與貢獻！</p>
            </div>
        </section>

        <div class="container my-5">
            <div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center">
                <div class="col">
                    <div class="profile-card">
                        <img src="/images/dcos.png" alt="Justin_chiu27">
                        <h3>Justin_chiu27</h3>
                        <p>網站負責人<br>負責整體製作及維護</p>
                    </div>
                </div>
                <div class="col">
                    <div class="profile-card">
                        <img src="/images/cos.png" alt="rockroll901">
                        <h3>rockroll901</h3>
                        <p>最初計畫推動者<br>協助測試與提供改良意見</p>
                    </div>
                </div>
                <div class="col">
                    <div class="profile-card">
                        <img src="/images/Xx_sup.png" alt="XxChortleKidd">
                        <h3>XxChortleKidd</h3>
                        <p>協助測試<br>提供影像支援與改良意見</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="survey-container">
            <h2>網站滿意度調查</h2>
            <form name="MPwebsite" method="POST" data-netlify="true">
                <div class="mb-4">
                    <label class="fw-bold d-block mb-2">您對於本網站整體使用的滿意度如何？</label>
                    <div class="radio-group">
                        <input type="radio" id="s1" name="satisfaction" value="非常滿意" required> <label for="s1">非常滿意</label><br>
                        <input type="radio" id="s2" name="satisfaction" value="滿意"> <label for="s2">滿意</label><br>
                        <input type="radio" id="s3" name="satisfaction" value="普通" checked> <label for="s3">普通</label><br>
                        <input type="radio" id="s4" name="satisfaction" value="不滿意"> <label for="s4">不滿意</label><br>
                        <input type="radio" id="s5" name="satisfaction" value="非常不滿意"> <label for="s5">非常不滿意</label>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="improvements" class="fw-bold d-block mb-2">建議改進的地方 (選填)</label>
                    <textarea class="form-control" id="improvements" name="suggest" rows="4" placeholder="請留下您的寶貴建議..."></textarea>
                </div>
                <button type="button" onclick="submitSurvey()" class="btn btn-success w-100 py-2 fs-5">提交調查</button>
            </form>
        </div>

        <img src="/images/22211111.png" alt="" width="100%" height="200" style="object-fit: contain;">

        <footer>
            <p> Copyright © 2025, Republic of China Army Military Police Command - Roblox. & Credits Justin_chiu27<br>
                All Rights Reserved. <span style="color:red; font-weight:bold;">嚴禁抄襲，違者必追究</span>
            </p>
        </footer>
    </main>

    <div id="snackbar">已提交，謝謝填寫問卷！</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const splashScreen = document.getElementById('splash-screen');
            const mainContent = document.getElementById('main-content');
            const continueButton = document.getElementById('continue-button');

            // --- 1. 載入導覽列邏輯 ---
            fetch('/navbar.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('navbar-placeholder').innerHTML = data;
                    
                    // 處理 Active 狀態
                    const currentPath = window.location.pathname;
                    const navLinks = document.querySelectorAll('.navbar-nav .nav-link, .dropdown-item');
                    
                    navLinks.forEach(link => {
                        const linkHref = link.getAttribute('href');
                        // 判定是否為製作人員頁面 (creater.html 或 credits.html)
                        if (linkHref && (currentPath.includes('creater.html') || currentPath.includes('credits.html')) && linkHref.includes('credits')) {
                             // 如果你以後 navbar 改名，這裡可以手動微調
                        }
                    });
                });

            // --- 2. 載入畫面邏輯 ---
            const hasVisited = sessionStorage.getItem('hasVisitedCreditsPage');

            if (hasVisited) {
                splashScreen.style.display = 'none';
                mainContent.style.display = 'block';
                document.body.style.overflow = '';
            } else {
                document.body.style.overflow = 'hidden';
                continueButton.addEventListener('click', hideSplashScreen);
                setTimeout(hideSplashScreen, 3000); // 3秒自動進入
            }

            function hideSplashScreen() {
                splashScreen.classList.add('hidden');
                sessionStorage.setItem('hasVisitedCreditsPage', 'true');
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                    mainContent.style.display = 'block';
                    document.body.style.overflow = '';
                }, 1000);
            }

            // --- 3. 視差滾動 ---
            window.addEventListener('scroll', function() {
                const bannerImage = document.querySelector('.banner-image');
                if (bannerImage) {
                    let offset = window.pageYOffset;
                    bannerImage.style.transform = `translateY(${offset * 0.3}px)`;
                }
            });
        });

        // 問卷提交提示
        function submitSurvey() {
            var x = document.getElementById("snackbar");
            x.className = "show";
            setTimeout(function () { x.className = x.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
